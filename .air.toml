# Hot reload configuration for Air
# https://github.com/cosmtrek/air

root = "."
tmp_dir = "tmp"

[build]
# Just a note, the binary will be in ./tmp/app
cmd = "go build -o ./tmp/app ./cmd/api"
bin = "tmp/app"
full_bin = "./tmp/app"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor", ".git", "node_modules"]
exclude_file = ["web/static/css/app.css"]
delay = 1000 # ms
stop_on_error = true
log = "air_errors.log"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
