# Worked-example deployment config (ADR-025 §6). Fly.io is an example, not a
# requirement — the Docker image built by ./Dockerfile is the portable
# contract; any container host works. Run behind Cloudflare-proxied DNS in
# Full (strict) mode: TLS terminates at the edge, the app serves plain HTTP
# on HTTP_PORT inside the private network (ADR-025 §2).
#
# Secrets (DATABASE_URL, SUPABASE_*, METRICS_TOKEN) go through
# `fly secrets set` — never in this file (ADR-015).

app = "go-performance-starter"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  HTTP_PORT = "4000"
  # Non-secret tuning lives here, versioned — not in `fly secrets` where it
  # becomes invisible and gets lost on app migrations.
  DB_MAX_CONNS = "10"
  # fly-proxy is the direct peer (observed 172.19.x.x, issue #72); trusting
  # its private range makes per-client rate limiting see real visitor IPs
  # instead of one shared bucket (ADR-027).
  TRUSTED_PROXY_CIDRS = "172.16.0.0/12"
  # Fly appends its own (unenumerable) edge IP to X-Forwarded-For, so XFF
  # resolves to the edge, not the visitor — Fly-Client-IP is authoritative
  # (verified live, issue #72; ADR-027 amendment).
  CLIENT_IP_HEADER = "Fly-Client-IP"
  # Anonymous guest identities (ADR-024): requires "anonymous sign-ins"
  # enabled in the Supabase project (done 2026-07). Visitors to /learn get a
  # real Supabase identity server-side; the TTL reaper expires stale ones.
  GUEST_MODE_ENABLED = "true"
  # Public-demo cadence (ADR-031): the nightly reset clears guests' content;
  # a short TTL keeps the reaper's identity cleanup in the same rhythm instead
  # of letting anonymous auth users linger for the 720h default.
  GUEST_TTL = "48h"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  # Steady-state budget is 128MB (ADR-000); 256MB leaves headroom for spikes.
  memory = "256mb"
