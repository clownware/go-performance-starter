name: CI

# The quality gate is `task ci` (ADR-021) — one definition of done, shared by
# local development and CI so the two cannot drift (same principle as the
# AGENTS.md spine check, ADR-022). This workflow only provides environment:
# a Postgres service, tool installs, and DB bootstrap. The docker job is the
# one genuinely CI-shaped check (image build + 30MB budget, ADR-000).

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Quality Gate (task ci)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        # Tracks production (Supabase runs Postgres 16 on Alpine) and
        # docker-compose.yml — keep all three on the same major (#84).
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alpine_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/alpine_saas_test?sslmode=disable
      ENV: test

    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        # go.mod's toolchain directive is the single source of the Go version;
        # a version pinned here went stale once already (GO-2026-5856 bump).
        go-version-file: 'go.mod'
        cache: true

    - name: Set up Node (Tailwind build for the asset-budget gate)
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Install Task
      run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

    - name: Install tools (templ, govulncheck, migrate, psql)
      run: |
        # go.mod is the single source of the templ version — a version pinned
        # here went stale once already (v0.3.1001 vs go.mod's v0.3.1020, #83).
        go install github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ)
        go install golang.org/x/vuln/cmd/govulncheck@latest
        curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xz migrate
        sudo mv migrate /usr/local/bin/
        sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

    - name: Generate templ
      run: templ generate

    - name: Bootstrap test database (auth stub + migrations)
      run: task db:test:setup
      env:
        PGPASSWORD: postgres

    - name: Run quality gate
      run: task ci

    - name: Upload coverage reports
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.txt
        fail_ci_if_error: false

    - name: Comment PR with binary size
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const stats = fs.statSync('./dist/app');
          const sizeMB = (stats.size / 1024 / 1024).toFixed(2);
          const budgetMB = 20;
          const emoji = stats.size <= budgetMB * 1024 * 1024 ? '✅' : '❌';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Performance Budget Check ${emoji}\n\n**Binary Size:** ${sizeMB} MB / ${budgetMB} MB`
          });

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Build (no push) on every PR so Dockerfile rot is caught continuously,
    # not first discovered by a release tag. The v0.3.0 release failed on an
    # npm flag removed years earlier because nothing ever built the image.
    - name: Build image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: local/app:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Enforce 30MB image budget (ADR-000)
      run: |
        SIZE=$(docker image inspect local/app:ci --format='{{.Size}}')
        MAX=$((30 * 1024 * 1024))
        echo "Image size: $SIZE bytes (budget: $MAX)"
        if [ "$SIZE" -gt "$MAX" ]; then
          echo "::error::Docker image ($SIZE bytes) exceeds the 30MB budget (ADR-000)"
          exit 1
        fi
