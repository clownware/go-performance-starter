name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alpine_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Install templ
      run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

    - name: Generate templ
      run: templ generate

    - name: Bootstrap test auth stub
      run: |
        sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
        PGPASSWORD=postgres psql -h localhost -U postgres -d alpine_saas_test -f sql/test/auth_stub.sql

    - name: Run migrations
      run: |
        curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
        ./migrate -path=./migrations -database "postgres://postgres:postgres@localhost:5432/alpine_saas_test?sslmode=disable" up

    - name: Lint
      run: |
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
        export PATH="$PATH:$(go env GOPATH)/bin"
        golangci-lint run ./...

    - name: Test
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/alpine_saas_test?sslmode=disable
        JWT_SECRET: test-secret-key-for-ci-only
        ENV: test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.txt
        fail_ci_if_error: false

  agents:
    name: Agent Spine Drift Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Check AGENTS.md is in sync with its sources (ADR-022)
      run: go run ./scripts/agentsmd check

  security:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install templ
      run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

    - name: Generate templ
      run: templ generate

    - name: govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install templ
      run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

    - name: Generate templ
      run: templ generate

    - name: Build
      run: go build -v ./cmd/api

  performance:
    name: Performance Budget Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install templ
      run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

    - name: Generate templ
      run: templ generate

    - name: Install Task
      run: |
        sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

    - name: Run performance budget tests
      run: task test:performance

    - name: Check binary size
      run: |
        mkdir -p ./dist
        go build -ldflags="-s -w" -o ./dist/app ./cmd/api
        go run scripts/check-binary-size.go ./dist/app

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const stats = fs.statSync('./dist/app');
          const sizeMB = (stats.size / 1024 / 1024).toFixed(2);
          const budgetMB = 20;
          const emoji = stats.size <= budgetMB * 1024 * 1024 ? '✅' : '❌';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Performance Budget Check ${emoji}\n\n**Binary Size:** ${sizeMB} MB / ${budgetMB} MB`
          });
