name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alpine_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run migrations
      run: |
        curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
        ./migrate -path=./migrations -database "postgres://postgres:postgres@localhost:5432/alpine_saas_test?sslmode=disable" up

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: Test
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/alpine_saas_test?sslmode=disable
        JWT_SECRET: test-secret-key-for-ci-only
        ENV: test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.txt
        fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Build
      run: go build -v ./cmd/api

  performance:
    name: Performance Budget Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Install Task
      run: |
        sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

    - name: Run performance budget tests
      run: task test:performance

    - name: Check binary size
      run: |
        mkdir -p ./dist
        go build -ldflags="-s -w" -o ./dist/app ./cmd/api
        go run scripts/check-binary-size.go ./dist/app

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const stats = fs.statSync('./dist/app');
          const sizeMB = (stats.size / 1024 / 1024).toFixed(2);
          const budgetMB = 20;
          const emoji = stats.size <= budgetMB * 1024 * 1024 ? '✅' : '❌';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Performance Budget Check ${emoji}\n\n**Binary Size:** ${sizeMB} MB / ${budgetMB} MB`
          });
