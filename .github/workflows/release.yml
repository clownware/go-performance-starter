# Release pipeline (ADR-025): on a version tag, build and publish the Docker
# image, enforce the 30MB image budget (ADR-000), apply migrations BEFORE
# deploying (ADR-025 §5), then deploy the demo instance. Migration and deploy
# jobs skip gracefully when the corresponding secrets are not configured, so
# forks can tag releases without a Supabase/Fly account.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local, for budget check)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: local/app:budget-check
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Enforce 30MB image budget (ADR-000)
        run: |
          SIZE=$(docker image inspect local/app:budget-check --format='{{.Size}}')
          MAX=$((30 * 1024 * 1024))
          echo "Image size: $SIZE bytes (budget: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Docker image ($SIZE bytes) exceeds the 30MB budget (ADR-000)"
            exit 1
          fi

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true

  stamp:
    name: Stamp versions.json
    runs-on: ubuntu-latest
    needs: image
    steps:
      # Stamp the manifest's "template" field on the default branch — the ref
      # external consumers read (ADR-030) — so it can never drift from tags.
      # The other keys are CI-verified against repo pins by `task versions:check`.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update template field to the released tag
        run: |
          jq --arg tag "${{ github.ref_name }}" '.template = $tag' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet versions.json; then
            echo "versions.json already stamped ${{ github.ref_name }} — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(release): stamp versions.json ${{ github.ref_name }}"
          git push origin "${{ github.event.repository.default_branch }}"

  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    needs: image
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Skip when no database secret is configured
        if: env.DATABASE_URL == ''
        run: echo "SUPABASE_DATABASE_URL not set — skipping production migrations."

      - name: Install golang-migrate
        if: env.DATABASE_URL != ''
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations (before deploy, ADR-025 §5)
        if: env.DATABASE_URL != ''
        run: migrate -path migrations -database "$DATABASE_URL" up

  deploy:
    name: Deploy (Fly.io example)
    runs-on: ubuntu-latest
    needs: migrate
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Skip when no Fly token is configured
        if: env.FLY_API_TOKEN == ''
        run: echo "FLY_API_TOKEN not set — skipping deploy."

      - name: Set up flyctl
        if: env.FLY_API_TOKEN != ''
        uses: superfly/flyctl-actions/setup-flyctl@dfdfedc86b296f5e5384f755a18bf400409a15d0 # v1.4

      # Fly can only pull public images or its own registry. GHCR packages
      # default to private (and stay private on forks), so deploying straight
      # from ghcr.io fails with "Authentication required" — v0.3.0 and v0.4.0
      # both died here. Mirror the exact image that passed the budget check
      # into registry.fly.io and deploy that; GHCR remains the published
      # artifact of record.
      - name: Log in to GHCR
        if: env.FLY_API_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror image to the Fly registry
        if: env.FLY_API_TOKEN != ''
        run: |
          APP=$(sed -n 's/^app *= *"\(.*\)"/\1/p' fly.toml)
          SRC="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          DST="registry.fly.io/${APP}:${{ github.ref_name }}"
          docker pull "$SRC"
          docker tag "$SRC" "$DST"
          flyctl auth docker
          docker push "$DST"
          echo "DEPLOY_IMAGE=$DST" >> "$GITHUB_ENV"

      - name: Deploy
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --image "$DEPLOY_IMAGE"
