# Continuous demo deploy (ADR-031): every merge to the default branch deploys
# to Fly.io, keeping the public demo current between tagged releases (which
# release.yml still deploys the careful way, via the budget-checked image).
#
# Adopter-clean by construction: the Fly app name comes from fly.toml, and the
# whole thing is gated on the FLY_API_TOKEN secret. The secrets context is not
# available in job-level `if:` expressions, so a gate job exposes the secret's
# presence as a step output; a clone without the secret sees a skipped job,
# not a failure — adding your own token enables your own deploys.
name: Deploy

on:
  push:
    branches: [ main, master ]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  gate:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    outputs:
      has-fly-token: ${{ steps.check.outputs.has-fly-token }}
    steps:
      - name: Detect FLY_API_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "has-fly-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-fly-token=false" >> "$GITHUB_OUTPUT"
            echo "FLY_API_TOKEN not set — deploy will be skipped."
          fi

  deploy:
    name: Deploy (Fly.io example)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.has-fly-token == 'true'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@dfdfedc86b296f5e5384f755a18bf400409a15d0 # v1.4

      - name: Install golang-migrate
        if: env.DATABASE_URL != ''
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations (before deploy, ADR-025 §5)
        if: env.DATABASE_URL != ''
        run: migrate -path migrations -database "$DATABASE_URL" up

      # --remote-only builds from ./Dockerfile on a Fly builder; the app name
      # and build config come from fly.toml, so nothing here is
      # deployment-specific.
      - name: Deploy
        run: flyctl deploy --remote-only