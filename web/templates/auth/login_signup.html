{{ define "title" }}Login or Sign Up{{ end }}

{{ define "content" }}
<div class="container mx-auto px-4 py-8 max-w-md bg-background text-text dark:bg-background-dark dark:text-text-dark">
  <h1 class="text-2xl font-bold mb-6 text-center">Welcome!</h1>

  <!-- Unified HTMX error/success message area -->
  <div id="auth-messages" class="mb-4 text-center"></div>

  <!-- Login Form -->
  <div class="bg-surface text-text dark:bg-surface-dark dark:text-text-dark p-6 rounded shadow-md mb-6">
    <h2 class="text-xl font-semibold mb-4">Login</h2>
    <form hx-post="/auth/login" hx-target="#auth-messages" hx-swap="innerHTML" autocomplete="on">
      <div class="mb-4">
        <label for="login-email" class="block text-text text-sm font-bold mb-2">Email</label>
        <input type="email" id="login-email" name="email" required autocomplete="email"
               class="shadow appearance-none border rounded w-full py-2 px-3 text-text bg-background dark:bg-background-dark dark:text-text-dark leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <div class="mb-2">
        <label for="login-password" class="block text-text text-sm font-bold mb-2">Password</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password"
               class="shadow appearance-none border rounded w-full py-2 px-3 text-text bg-background dark:bg-background-dark dark:text-text-dark mb-1 leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <div class="mb-4 text-right">
        <a href="#" class="text-sm text-primary hover:underline dark:text-primary-dark">Forgot password?</a>
      </div>
      <button type="submit"
              class="w-full bg-primary text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline hover:opacity-90 dark:bg-primary-dark dark:hover:opacity-90">
        Login
      </button>
    </form>
  </div>

  <!-- Signup Form -->
  <div class="bg-surface text-text dark:bg-surface-dark dark:text-text-dark p-6 rounded shadow-md">
    <h2 class="text-xl font-semibold mb-4">Sign Up</h2>
    <form hx-post="/auth/signup" hx-target="#auth-messages" hx-swap="innerHTML" autocomplete="on">
      <div class="mb-4">
        <label for="signup-email" class="block text-text text-sm font-bold mb-2">Email</label>
        <input type="email" id="signup-email" name="email" required autocomplete="email"
               class="shadow appearance-none border rounded w-full py-2 px-3 text-text bg-background dark:bg-background-dark dark:text-text-dark leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <div class="mb-4">
        <label for="signup-password" class="block text-text text-sm font-bold mb-2">Password</label>
        <input type="password" id="signup-password" name="password" required autocomplete="new-password"
               class="shadow appearance-none border rounded w-full py-2 px-3 text-text bg-background dark:bg-background-dark dark:text-text-dark leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <div class="mb-6">
        <label for="signup-password-confirm" class="block text-text text-sm font-bold mb-2">Confirm Password</label>
        <input type="password" id="signup-password-confirm" name="password_confirm" required autocomplete="new-password"
               class="shadow appearance-none border rounded w-full py-2 px-3 text-text bg-background dark:bg-background-dark dark:text-text-dark leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <button type="submit"
              class="w-full bg-primary text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline hover:opacity-90 dark:bg-primary-dark dark:hover:opacity-90">
        Sign Up
      </button>
    </form>
  </div>
</div>
{{ end }}
