<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Micro SaaS Starter Kit">
    <title>{{block "title" .}}Micro SaaS Starter Kit{{end}}</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/app.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    
    <!-- HTMX -->
    <script src="/static/js/htmx.min.js" defer></script>
    
    <!-- Alpine.js -->
    <script src="/static/js/alpine.min.js" defer></script>
</head>

<body class="min-h-screen bg-gray-50 flex flex-col">
    <!-- Skip to content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:p-4 focus:bg-white focus:z-50">
        Skip to content
    </a>

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-xl font-bold text-primary-600">
                        Micro SaaS Starter
                    </a>
                    {{block "nav" .}}
                    <nav class="hidden md:flex space-x-4">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-gray-900 hover:bg-gray-100">Home</a>
                        <a href="/dashboard" class="px-3 py-2 rounded-md text-sm font-medium text-gray-900 hover:bg-gray-100">Dashboard</a>
                    </nav>
                    {{end}}
                </div>
                
                <div class="flex items-center space-x-4">
                    {{block "user-menu" .}}
                    <a href="/auth/login" class="btn btn-primary">Login</a>
                    {{end}}
                </div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main id="main-content" class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {{block "content" .}}
            <p>Default content</p>
            {{end}}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-500 text-sm">
                    &copy; {{.CurrentYear}} Micro SaaS Starter Kit. All rights reserved.
                </p>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <a href="/terms" class="text-sm text-gray-500 hover:text-gray-900">Terms</a>
                    <a href="/privacy" class="text-sm text-gray-500 hover:text-gray-900">Privacy</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- App scripts -->
    <script src="/static/js/app.js" defer></script>
    
    <!-- HTMX extensions -->
    {{block "htmx-extensions" .}}{{end}}
    
    <!-- Alpine.js initialization -->
    <script>
        document.addEventListener('alpine:init', () => {
            // Alpine.js data and components can be registered here
        });
    </script>
</body>

</html>
