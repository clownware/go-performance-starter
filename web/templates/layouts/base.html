<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Micro SaaS Starter Kit">
    <title>{{block "title" .}}Micro SaaS Starter Kit{{end}}</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="stylesheet" href="/static/css/semantic-colors.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    
    <!-- HTMX -->
    <script src="/static/js/htmx.min.js" defer></script>
    
    <!-- Alpine.js -->
    <script src="/static/js/alpine.min.js" defer></script>
</head>

<body x-data="{ dark: localStorage.getItem('dark') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }" 
      x-init="
        if (dark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        $watch('dark', val => { 
          if (val) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          localStorage.setItem('dark', val ? 'true' : 'false');
        });
      " 
      class="min-h-screen flex flex-col bg-background dark:bg-background-dark text-text dark:text-text-dark">
    <!-- Skip to content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:p-4 focus:bg-white focus:z-50">
        Skip to content
    </a>

    <!-- Header -->
    <header class="bg-surface text-text dark:bg-surface-dark dark:text-text-dark shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-xl font-bold text-primary-600">
                        Micro SaaS Starter
                    </a>
                    {{block "nav" .}}
                    <nav class="hidden md:flex space-x-4">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-text hover:bg-gray-100 dark:text-text-dark dark:hover:bg-gray-800">Home</a>
                        <a href="/dashboard" class="px-3 py-2 rounded-md text-sm font-medium text-text hover:bg-gray-100 dark:text-text-dark dark:hover:bg-gray-800">Dashboard</a>
                    </nav>
                    {{end}}
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="flex items-center gap-6">
                    <!-- Dark mode toggle button -->
                    <button @click="dark = !dark" 
                            :aria-pressed="dark" 
                            :class="dark ? 'bg-primary text-white' : 'bg-surface text-primary'" 
                            class="rounded-full p-2 border-2 border-primary focus:outline-none focus:ring-2 focus:ring-primary transition-colors shadow-sm" 
                            title="Toggle dark mode">
                        <img x-show="!dark" x-cloak src="/static/img/emblem-black.svg" alt="Enable dark mode" class="h-5 w-5" />
                        <img x-show="dark" x-cloak src="/static/img/emblem-white.svg" alt="Enable light mode" class="h-5 w-5" />
                    </button>
                    <!-- User menu -->
                    {{block "user-menu" .}}
                    <div x-data="{ open: false }" class="relative">
                      <button @click="open = !open" class="flex items-center focus:outline-none">
                        <span class="mr-2 text-text dark:text-text-dark">John Doe</span>
                        <svg class="w-4 h-4 transform transition-transform" :class="{ 'rotate-180': open }" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                      </button>
                      <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-surface text-text dark:bg-surface-dark dark:text-text-dark shadow-lg rounded-md py-2 z-50">
                        <a href="/profile" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Profile</a>
                        <a href="/auth/logout" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Logout</a>
                      </div>
                    </div>
                    {{end}}
                </div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main id="main-content" class="flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {{block "content" .}}
            <p>Default content</p>
            {{end}}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface text-text dark:bg-surface-dark dark:text-text-dark border-t border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-500 dark:text-gray-400 text-sm">
                    &copy; {{.CurrentYear}} Micro SaaS Starter Kit. All rights reserved.
                </p>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <a href="/terms" class="text-sm text-gray-500 hover:text-text dark:text-gray-400 dark:hover:text-text-dark">Terms</a>
                    <a href="/privacy" class="text-sm text-gray-500 hover:text-text dark:text-gray-400 dark:hover:text-text-dark">Privacy</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- App scripts -->
    <script src="/static/js/app.js" defer></script>
    
    <!-- Global HTMX loading indicator -->
    <div id="global-loading" class="hidden fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center z-50">
      <div class="text-white font-semibold">Loading...</div>
    </div>
    <script>
      document.body.addEventListener('htmx:beforeRequest', function() {
        document.getElementById('global-loading').classList.remove('hidden');
      });
      document.body.addEventListener('htmx:afterRequest', function() {
        document.getElementById('global-loading').classList.add('hidden');
      });
    </script>
    
    <!-- Toast notifications -->
    <div id="global-toast" class="hidden fixed bottom-4 right-4 bg-green-600 text-white px-4 py-2 rounded shadow-lg"></div>
    <script>
      document.body.addEventListener('htmx:afterRequest', function(evt) {
        var msg = evt.detail.xhr.getResponseHeader('HX-Trigger');
        if (msg) {
          var toast = document.getElementById('global-toast');
          toast.textContent = msg;
          toast.classList.remove('hidden');
          setTimeout(function() { toast.classList.add('hidden'); }, 3000);
        }
      });
    </script>
    
    <!-- HTMX extensions -->
    {{block "htmx-extensions" .}}{{end}}
    
    <!-- Alpine.js initialization -->
    <script>
        document.addEventListener('alpine:init', () => {
            // Alpine.js data and components can be registered here
        });
    </script>
</body>

</html>
