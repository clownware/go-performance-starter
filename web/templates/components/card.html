{{define "card"}}
<div class="{{if .Class}}{{.Class}}{{else}}bg-white rounded-lg shadow-md p-6{{end}}" {{if .ID}}id="{{.ID}}"{{end}} {{if .Attributes}}{{.Attributes | rawHTML}}{{end}}>
  {{if .Title}}
  <div class="{{if .TitleClass}}{{.TitleClass}}{{else}}mb-4{{end}}">
    <h3 class="{{if .TitleTextClass}}{{.TitleTextClass}}{{else}}text-lg font-medium text-gray-900{{end}}">{{.Title}}</h3>
    {{if .Subtitle}}<p class="{{if .SubtitleClass}}{{.SubtitleClass}}{{else}}text-sm text-gray-500{{end}}">{{.Subtitle}}</p>{{end}}
  </div>
  {{end}}
  
  <div class="{{if .ContentClass}}{{.ContentClass}}{{end}}">
    {{.Content}}
  </div>
  
  {{if .Footer}}
  <div class="{{if .FooterClass}}{{.FooterClass}}{{else}}mt-4 pt-4 border-t border-gray-200{{end}}">
    {{.Footer}}
  </div>
  {{end}}
</div>
{{end}}
