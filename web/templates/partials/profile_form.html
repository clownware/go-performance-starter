{{define "profile_form"}}
<div class="space-y-4">
  {{with index .Errors "name"}}
    <p class="text-red-600 text-sm">{{.}}</p>
  {{end}}
  {{if .Success}}
    <div x-data="{show: true}" x-show="show" x-init="setTimeout(() => show = false, 3000)" class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded">
      Profile updated successfully!
    </div>
  {{end}}
  <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
  <input type="text" name="name" id="name" value="{{.Name}}" class="mt-1 block w-full border-gray-300 rounded-md focus:ring-primary-500 focus:border-primary-500">
  <div class="mt-2">
    <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded" hx-indicator=".indicator">Save</button>
    <span class="indicator hidden text-gray-500 ml-2">Saving...</span>
  </div>
</div>
{{end}}
