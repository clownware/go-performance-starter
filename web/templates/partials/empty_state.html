<!-- partials/empty_state.html -->
<section class="flex flex-col items-center justify-center py-20 text-center">
  <div class="mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-blue-100 dark:bg-blue-900">
    <!-- Heroicon: PlusCircle (outline) -->
    <svg class="h-8 w-8 text-blue-500 dark:text-blue-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v8m4-4H8" />
    </svg>
  </div>
  <h2 class="mb-2 text-2xl font-semibold text-gray-900 dark:text-white">{{ .Headline | default "Welcome to Your Dashboard!" }}</h2>
  <p class="mb-6 max-w-md text-base text-gray-600 dark:text-gray-300">{{ .Body | default "You haven’t added any projects yet. Get started by creating your first project and unlock the full power of your SaaS workspace." }}</p>
  <a href="{{ .CTAHref | default "/projects/new" }}" class="inline-block rounded bg-blue-600 px-5 py-2 text-white font-medium shadow hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 transition">
    {{ .CTALabel | default "Create Project" }}
  </a>
</section>
