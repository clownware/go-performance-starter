version: "2"
run:
  go: "1.25"
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - whitespace
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - path: (.+)\.go$
        text: should have a package comment
      - path: (.+)\.go$
        text: exported .* should have comment or be unexported
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/clownware/go-performance-starter
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
