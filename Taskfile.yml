version: '3'

dotenv: ['.env']

tasks:
  # Development tasks
  dev:
    desc: Run the application with hot reloading (uses air)
    cmds:
      - air

  build:
    desc: Build the application
    deps: [templ:generate]
    cmds:
      - go build -ldflags="-s -w -X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" -o ./dist/app ./cmd/api
    generates:
      - ./dist/app

  run:
    desc: Run the application without hot reloading
    cmds:
      - go run ./cmd/api

  # Dependency tasks
  deps:install:
    desc: Install project dependencies
    cmds:
      - go mod tidy

  # Linting/Code quality tasks
  lint:install:
    desc: Install golangci-lint for local development
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
    status:
      - which golangci-lint

  lint:
    desc: Run linters
    deps: [lint:install]
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format Go code (gofmt + goimports via golangci-lint v2)
    deps: [lint:install]
    cmds:
      - golangci-lint fmt ./...

  fmt:check:
    desc: Fail if any Go file is not gofmt-clean
    cmds:
      - |
        unformatted=$(gofmt -l $(find . -name '*.go' -not -name '*_templ.go' -not -path './vendor/*'))
        if [ -n "$unformatted" ]; then
          echo "❌ These files are not gofmt-clean:"; echo "$unformatted"; exit 1
        fi
        echo "✅ gofmt clean"

  # Agentic discipline tasks
  agents:build:
    desc: Regenerate AGENTS.md from CLAUDE.md + .claude/*.md source layers
    cmds:
      - go run ./scripts/agentsmd build

  agents:check:
    desc: Fail if AGENTS.md has drifted from its source layers (ADR-022)
    cmds:
      - go run ./scripts/agentsmd check

  ci:
    desc: Halt-on-violation quality gate — run before claiming a change is complete (ADR-021)
    cmds:
      - task: fmt:check
      - task: lint
      - go test -race -cover ./...
      - task: agents:check
      - task: test:binary-size
      - task: test:asset-budgets
      - task: scan:vuln

  # Templ tasks
  templ:generate:
    desc: Generate Go code from templ files
    cmds:
      - templ generate

  templ:watch:
    desc: Watch templ files and regenerate on change
    cmds:
      - templ generate --watch

  # Database tasks
  db:up:
    desc: Start the database container
    cmds:
      - docker-compose up -d db

  db:down:
    desc: Stop the database container
    cmds:
      - docker-compose down

  db:auth-stub:
    desc: Apply the Supabase auth.uid() stub to a vanilla Postgres (test/local only, not for Supabase)
    cmds:
      - psql "${DATABASE_URL}" -f sql/test/auth_stub.sql

  db:test:setup:
    desc: Bootstrap a vanilla Postgres for tests (auth stub + migrations)
    cmds:
      - task: db:auth-stub
      - task: db:migrate:up

  db:migrate:up:
    desc: Run database migrations up
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations up

  db:migrate:down:
    desc: Revert the last database migration
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations down 1

  db:migrate:force:
    desc: Force set the database migration version (use with caution)
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations force {{.VERSION}}

  # Test tasks
  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  test:performance:
    desc: Run performance budget tests
    cmds:
      - go test -v ./internal/performance/...
      - task: test:binary-size
      - task: test:asset-budgets

  test:binary-size:
    desc: Check binary size against budget
    cmds:
      - go build -ldflags="-s -w -X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" -o ./dist/app ./cmd/api
      - go run scripts/check-binary-size.go ./dist/app

  test:asset-budgets:
    desc: Check gzipped JS/CSS sizes against the ADR-000 frontend budgets
    cmds:
      - go run ./scripts/check-asset-budgets

  test:memory-profile:
    desc: Run memory profiling tests
    cmds:
      - go test -memprofile=mem.prof -run=^$ -bench=. ./internal/performance/...
      - go tool pprof -text mem.prof

  # Docker tasks
  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t go-performance-starter .

  db:migrate:create:
    desc: Create a new migration file
    cmds:
      - migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}

  db:generate:
    desc: Generate Go code from SQL queries using sqlc
    cmds:
      - sqlc generate

  # CSS tasks
  css:build:
    desc: Build CSS files with Tailwind
    cmds:
      - npx @tailwindcss/cli -i ./web/static/css/input.css -o ./web/static/css/app.css

  css:watch:
    desc: Watch and build CSS files with Tailwind
    cmds:
      - npx @tailwindcss/cli -i ./web/static/css/input.css -o ./web/static/css/app.css --watch

  # Security tasks
  scan:vuln:
    desc: Check for vulnerable dependencies
    cmds:
      - govulncheck ./...

  # Clean tasks
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./dist
      - rm -rf ./tmp
      - rm -f app coverage.out

  # Default task
  default:
    desc: Default task
    deps: [css:build]
