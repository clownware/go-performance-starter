version: '3'

dotenv: ['.env']

tasks:
  # Development tasks
  dev:
    desc: Run the application with hot reloading (uses air)
    cmds:
      - air

  build:
    desc: Build the application
    cmds:
      - go build -o ./dist/app ./cmd/api
    generates:
      - ./dist/app

  run:
    desc: Run the application without hot reloading
    cmds:
      - go run ./cmd/api

  # Dependency tasks
  deps:install:
    desc: Install project dependencies
    cmds:
      - go mod tidy

  # Linting/Code quality tasks
  lint:
    desc: Run linters
    cmds:
      - golangci-lint run

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  # Database tasks
  db:up:
    desc: Start the database container
    cmds:
      - docker-compose up -d db

  db:down:
    desc: Stop the database container
    cmds:
      - docker-compose down

  db:migrate:up:
    desc: Run database migrations up
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations up

  db:migrate:down:
    desc: Revert the last database migration
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations down 1

  db:migrate:force:
    desc: Force set the database migration version (use with caution)
    cmds:
      - migrate -database "${DATABASE_URL}" -path migrations force {{.VERSION}}

  # Test tasks
  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  # Docker tasks
  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t go-alpine-saas-starter .

  db:migrate:create:
    desc: Create a new migration file
    cmds:
      - migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}

  db:generate:
    desc: Generate Go code from SQL queries using sqlc
    cmds:
      - sqlc generate

  # Clean tasks
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./dist
      - rm -rf ./tmp
